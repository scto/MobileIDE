<?xml version="1.0" encoding="UTF-8"?>
<!--
  MobileIDE – Adaptive Icon BACKGROUND Layer
  Canvas: 108dp × 108dp
  Design: Dark navy radial gradient — matches IDE's Catppuccin Mocha theme
  Used by: mipmap-anydpi-v26/ic_launcher.xml  +  ic_launcher_round.xml
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#1A1A2E"/>
      <stop offset="55%"  stop-color="#0F1020"/>
      <stop offset="100%" stop-color="#080C16"/>
    </radialGradient>
  </defs>
  <!-- Full-bleed background rectangle -->
  <rect width="108" height="108" fill="url(#bg)"/>
</svg>
