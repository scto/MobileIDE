<?xml version="1.0" encoding="UTF-8"?>
<!--
  MobileIDE – Adaptive Icon MONOCHROME Layer
  Canvas: 108dp × 108dp
  Design: White silhouette on transparent background
          System tints this automatically on Android 13+
  Used by: mipmap-anydpi-v26/ic_launcher.xml (monochrome element)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">

  <!-- Rounded rectangle silhouette (matches centre square + text area) -->
  <rect x="20" y="20" width="68" height="68" rx="14" ry="14" fill="#FFFFFF"/>

  <!-- </> cutout symbol — rendered as white text (system will tint) -->
  <text x="54" y="46"
        font-family="'Courier New', monospace"
        font-size="12" font-weight="700"
        text-anchor="middle" fill="#000000" letter-spacing="1">
    &lt;/&gt;
  </text>

  <!-- "Mobile" cutout -->
  <text x="54" y="60"
        font-family="'Arial', sans-serif"
        font-size="11" font-weight="400"
        text-anchor="middle" fill="#000000">
    Mobile
  </text>

  <!-- "IDE" cutout -->
  <text x="54" y="76"
        font-family="'Arial', sans-serif"
        font-size="18" font-weight="800"
        text-anchor="middle" fill="#000000" letter-spacing="2">
    IDE
  </text>
</svg>
