# AndroidIDE: enforce UTF-8 & locale for Gradle daemon
systemProp.user.country=US
systemProp.user.language=en
systemProp.sun.jnu.encoding=UTF-8
systemProp.file.encoding=UTF-8

# --- RAM & CPU OPTIMIERUNGEN ---
# Daemon: Wenn 'false', wird nach jedem Build der Speicher sofort freigegeben. 
# Das spart maximalen RAM, benötigt aber bei jedem Start mehr CPU. 
org.gradle.daemon=false
# Greift nur, falls du den Daemon doch einschaltest (schließt ihn nach 1 Minute Inaktivität statt nach 3 Stunden)
org.gradle.daemon.idletimeout=60000

# Parallelisierung strikt verbieten (verhindert CPU-Spikes und zu viele Child-Prozesse)
org.gradle.parallel=false
org.gradle.workers.max=1
android.enableAapt2Daemon=false
kotlin.compiler.execution.strategy=in-process

# On-Demand Konfiguration: Konfiguriert nur die Module, die für den Build relevant sind (spart massiv CPU bei modularen Projekten)
org.gradle.configureondemand=true

# Caching aktivieren: Tauscht etwas Speicherplatz auf dem Gerät gegen eine massive CPU-Ersparnis bei Rebuilds ein
org.gradle.caching=true

# JVM Argumente: 
# -Xmx1024m: Reduziert von 1.5GB auf 1GB (oft der Sweetspot, um OOM-Kills durch Android zu verhindern).
# -XX:MaxMetaspaceSize=256m: Reduziert den Speicher für Metadaten.
# -XX:+UseSerialGC: Erzwingt den Single-Threaded Garbage Collector (Standard ist G1GC, der viele Threads nutzt. SerialGC spart extrem viel CPU-Overhead auf mobilen Geräten).
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=256m -XX:+UseSerialGC -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Duser.language=en -Duser.country=US

# --- STANDARD ANDROID & KOTLIN SETTINGS ---
android.nonTransitiveRClass=true
android.useAndroidX=true
android.injected.testOnly=false
kotlin.code.style=official
