name: Android Release CI

on:
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set Commit Hash
        id: commit_hash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Clone submodules
        run: git submodule update --init --recursive

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon && mv app/build/outputs/apk/release/*.apk app/MobileIDE-${{ env.COMMIT_HASH }}.apk
        continue-on-error: false

      - name: Archive APK
        uses: actions/upload-artifact@v7
        with:
          name: MobileIDE-Release
          path: app/MobileIDE-${{ env.COMMIT_HASH }}.apk
