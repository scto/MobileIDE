name: 🚀 Build & Validate

on:
  repository_dispatch:
    types: [ libs-versions-updated ]
  pull_request:
    paths:
      - '**/*'
      - '!**/.github/workflows/**'
  workflow_dispatch:
    inputs:
      task:
        description: 'Check or Apply.'
        required: true
        default: Check
  
jobs:
  lint:
    name: 🔍 Lint & Code Style Check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v5

      - name: ✅ Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: 📜 Copy CI gradle.properties
        run: mkdir -p ~/.gradle && cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: 🏗️ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: ⚙️ Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 🧼 Run Spotless${{github.event.inputs.task}}
        run: ./gradlew spotless${{github.event.inputs.task}} --init-script gradle/init.gradle.kts --no-configuration-cache

  build:
    name: 🏗️ Build & Compile
    needs: lint  # Only runs if lint passes ✅
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v5

      - name: 📜 Copy CI gradle.properties
        run: mkdir -p ~/.gradle && cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: 🏗️ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: ⚙️ Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 🧹 Clean Project
        run: ./gradlew clean

      - name: 🔨 Build Project
        run: ./gradlew build
