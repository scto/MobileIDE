<?xml version="1.0" encoding="UTF-8"?>
<!--
  MobileIDE – Master SVG Icon
  Design: Dark navy circle · 4 vibrant rotated cards · dark center square · "Mobile IDE" + </> text
  Canvas: 512 × 512 px
  Usage: source for generating PNGs at any density
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Circular clip for the outer boundary -->
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="252"/>
    </clipPath>

    <!-- Dark radial background gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1A1A2E"/>
      <stop offset="60%"  stop-color="#0F1020"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </radialGradient>

    <!-- Subtle glow for center square border -->
    <filter id="center-glow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Card shadow -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── Background circle ──────────────────────────────────────────────── -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-grad)"/>

  <!-- ── 4 coloured rotated cards (clipped to circle) ──────────────────── -->
  <g clip-path="url(#circle-clip)">

    <!-- Top-right card — Electric Blue — rotated +25° -->
    <g transform="rotate(25, 256, 256)">
      <rect x="183" y="43" width="190" height="190" rx="42" ry="42"
            fill="#0082FF" opacity="0.95" filter="url(#card-shadow)"/>
    </g>

    <!-- Top-left card — Neon Teal — rotated -25° -->
    <g transform="rotate(-25, 256, 256)">
      <rect x="139" y="43" width="190" height="190" rx="42" ry="42"
            fill="#00D2C8" opacity="0.95" filter="url(#card-shadow)"/>
    </g>

    <!-- Bottom-left card — Deep Violet — rotated +18° -->
    <g transform="rotate(18, 256, 256)">
      <rect x="139" y="279" width="190" height="190" rx="42" ry="42"
            fill="#8232FF" opacity="0.95" filter="url(#card-shadow)"/>
    </g>

    <!-- Bottom-right card — Vivid Green — rotated -18° -->
    <g transform="rotate(-18, 256, 256)">
      <rect x="183" y="279" width="190" height="190" rx="42" ry="42"
            fill="#32D25A" opacity="0.95" filter="url(#card-shadow)"/>
    </g>
  </g>

  <!-- ── Dark center square ─────────────────────────────────────────────── -->
  <rect x="153" y="153" width="206" height="206" rx="40" ry="40"
        fill="#16162A" filter="url(#center-glow)"/>
  <!-- Subtle border -->
  <rect x="153" y="153" width="206" height="206" rx="40" ry="40"
        fill="none" stroke="#37376A" stroke-width="1.5"/>

  <!-- ── Code symbol </> ───────────────────────────────────────────────── -->
  <text x="256" y="222"
        font-family="'Courier New', 'DejaVu Sans Mono', monospace"
        font-size="36" font-weight="700"
        text-anchor="middle" fill="#50A0FF" letter-spacing="2">
    &lt;/&gt;
  </text>

  <!-- ── "Mobile" label ────────────────────────────────────────────────── -->
  <text x="256" y="270"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="34" font-weight="400"
        text-anchor="middle" fill="#D2DAFF" letter-spacing="1">
    Mobile
  </text>

  <!-- ── "IDE" label ───────────────────────────────────────────────────── -->
  <text x="256" y="320"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="54" font-weight="800"
        text-anchor="middle" fill="#FFFFFF" letter-spacing="3">
    IDE
  </text>
</svg>
